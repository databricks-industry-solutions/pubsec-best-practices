resources:
  jobs:
    dq_demo_job:
      name: "Data Quality Demo — ODCS + DQX"
      description: >
        Multi-task demo showcasing ODCS data contracts and Databricks Labs DQX
        for automated, contract-driven data quality validation.
      tags:
        team: field-engineering
        domain: data-quality
        demo: "true"
      max_concurrent_runs: 1

      tasks:
        - task_key: "01_generate_data"
          description: "Generate synthetic e-commerce data with intentional quality issues."
          notebook_task:
            notebook_path: ../notebooks/01_generate_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "02_transform_data"
          description: "Join raw tables into curated_orders, preserving quality issues."
          depends_on:
            - task_key: "01_generate_data"
          notebook_task:
            notebook_path: ../notebooks/02_transform_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "03_validate_contract"
          description: "Parse ODCS contract YAML and write contract_rules table."
          depends_on:
            - task_key: "02_transform_data"
          notebook_task:
            notebook_path: ../notebooks/03_validate_contract.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              contract_path: /tmp/orders_contract.yaml

        - task_key: "04_dqx_quality_checks"
          description: "Run DQX checks derived from the ODCS contract. Split valid vs quarantine."
          depends_on:
            - task_key: "03_validate_contract"
          notebook_task:
            notebook_path: ../notebooks/04_dqx_quality_checks.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "05_quality_report"
          description: "Scorecard, SLA compliance check, per-region/status breakdowns."
          depends_on:
            - task_key: "04_dqx_quality_checks"
          notebook_task:
            notebook_path: ../notebooks/05_quality_report.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
