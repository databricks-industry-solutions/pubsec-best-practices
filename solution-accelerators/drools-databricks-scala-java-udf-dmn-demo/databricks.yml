bundle:
  name: drools-databricks-dmn-map-udf-demo

variables:
  jar_volume_path:
    default: /Volumes/dbx_practice_ws/default/dbx-practice-volume/drools-databricks-dmn-map-udf-demo-2.2.0.jar

resources:
  jobs:
    drools_dmn_map_udf_poc_job:
      name: drools-databricks-dmn-map-udf-poc-job
      tasks:
        - task_key: run_dmn_map_udf_poc
          new_cluster:
            spark_version: 18.1.x-scala2.13
            node_type_id: Standard_D4s_v3
            num_workers: 4
            data_security_mode: SINGLE_USER
            single_user_name: siliconpot.architect@gmail.com
          libraries:
            - jar: ${var.jar_volume_path}
          notebook_task:
            notebook_path: ${workspace.file_path}/databricks/notebooks/dmn_map_udf_poc

targets:
  dev:
    mode: production
    default: true
    workspace:
      #host: https://adb-7405609760217234.14.azuredatabricks.net
      host: https://fevm-services-bureau.cloud.databricks.com
      root_path: /Workspace/drools-on-databricks-scala-java-udf-dmn-demo/.bundle
      file_path: /Workspace/drools-on-databricks-scala-java-udf-dmn-demo
