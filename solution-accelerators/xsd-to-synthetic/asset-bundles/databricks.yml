bundle:
  name: xsd-to-synthetic

workspace:
  host: ${var.databricks_host}

variables:
  databricks_host:
    description: Databricks workspace URL

include:
  - resources/*.yml

targets:
  dev:
    default: true
    variables:
      databricks_host: ${DATABRICKS_HOST}

  staging:
    variables:
      databricks_host: ${DATABRICKS_HOST}

  prod:
    variables:
      databricks_host: ${DATABRICKS_HOST}
