command:
  - "uvicorn"
  - "server.app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "$DATABRICKS_APP_PORT"

# Workspace-specific values. Replace with values from your own workspace
# before deploying. See apps/rules-editor/README.md for what each one is.
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<your-warehouse-id>"
  - name: DATABRICKS_CLUSTER_ID
    value: "<your-cluster-id>"
  - name: SCORING_JOB_ID
    value: "<your-job-id>"
  - name: SCORING_NOTEBOOK_PATH
    value: "/Workspace/Shared/fraud_rules_engine/04_batch_scoring"
  - name: UC_CATALOG
    value: "main"
  - name: UC_SCHEMA
    value: "irs_rrp"
  - name: UC_VOLUME
    value: "dmn_rules"
