bundle:
  name: fraud-rules-engine

include:
  - resources/*.yml

# Both targets reference a Databricks CLI profile named in this file. Override
# at deploy time with `databricks bundle deploy --profile <your-profile>` or
# replace the values below with your own profile name.
targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT

  prod:
    mode: production
    workspace:
      profile: DEFAULT

resources:
  apps:
    fraud_rules_engine:
      name: "fraud-rules-engine-${bundle.target}"
      description: "Fraud Rules Engine — Blaze Advisor replacement demo"
      source_code_path: .
